spring.application.name=jotech-hub-backend
server.port=8080

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/jotech_hub_db
spring.datasource.username=postgres
spring.datasource.password=EL2004

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope[0]=email
spring.security.oauth2.client.registration.google.scope[1]=profile
app.frontend.oauth2-success-url=http://localhost:3000/oauth2/callback
app.frontend.oauth2-failure-url=http://localhost:3000/login
# ===============================
# JWT
# ===============================
app.jwt.secret=change_this_to_a_long_random_secret_key_for_jotech_hub_2026_please_change_me
app.jwt.expiration=86400000
app.jwt.issuer=jotech-hub

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
