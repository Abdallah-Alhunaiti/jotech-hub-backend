spring.application.name=jotech-hub-backend
server.port=${SERVER_PORT:8080}

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jotech_hub_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope[0]=email
spring.security.oauth2.client.registration.google.scope[1]=profile

app.frontend.oauth2-success-url=${FRONTEND_SUCCESS_URL:http://localhost:3000/oauth2/callback}
app.frontend.oauth2-failure-url=${FRONTEND_FAILURE_URL:http://localhost:3000/login}
app.frontend.oauth2-onboarding-url=${FRONTEND_ONBOARDING_URL:http://localhost:3000/oauth2/choose-account-type}

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.issuer=${JWT_ISSUER:jotech-hub}

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:ahmad.sammour755@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nptbhphkdjqrsnqz}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

app.mail.from=${MAIL_FROM:ahmad.sammour755@gmail.com}

# ===============================
# PASSWORD RESET
# ===============================
app.frontend.password-reset-url=${FRONTEND_PASSWORD_RESET_URL:http://localhost:3000/reset-password}
app.auth.password-reset-expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:15}
app.auth.expose-password-reset-token=${EXPOSE_PASSWORD_RESET_TOKEN:false}

# ===============================
# UPLOADS
# ===============================
file.profile-images-dir=uploads/profile-images
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF